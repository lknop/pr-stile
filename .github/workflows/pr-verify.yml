name: PR Human Verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  statuses: write
  issues: write

jobs:
  verify:
    uses: ./.github/workflows/pr-human-verify.yml
    with:
      event_name: ${{ github.event_name }}
      worker_url: ${{ vars.WORKER_URL }}
    secrets:
      HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
